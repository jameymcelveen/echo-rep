name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore, build, test
        run: dotnet test tests/api/api.Tests.csproj --verbosity minimal
